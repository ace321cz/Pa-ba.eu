<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAŘBA.EU | Elitní Team Speak 3 Komunita</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Kanit:wght@300;400;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --accent: #ff0000; --glow: rgba(255, 0, 0, 0.6); }
        
        body { 
            background: #020202; color: white; font-family: 'Kanit', sans-serif; margin: 0;
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1920');
            background-size: cover; background-attachment: fixed; background-position: center;
        }

        .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 100px 20px; }
        
        .main-title { 
            font-family: 'Orbitron', sans-serif; font-size: clamp(3.5rem, 15vw, 8rem); font-weight: 900; 
            text-transform: uppercase; letter-spacing: -2px; line-height: 0.9;
            background: linear-gradient(to bottom, #fff 30%, #666 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px var(--glow));
        }

        .ip-card {
            background: rgba(255, 255, 255, 0.05); border: 2px solid var(--accent);
            padding: 40px; border-radius: 20px; backdrop-filter: blur(15px);
            margin: 50px 0; width: 100%; max-width: 600px; cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .ip-card:hover { transform: scale(1.05); box-shadow: 0 0 50px var(--glow); }

        .status-badge {
            background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 50px;
            font-size: 0.9rem; font-weight: 800; border: 1px solid #2ecc71; color: #2ecc71;
            display: inline-flex; align-items: center; gap: 8px; margin-bottom: 15px;
        }
        .dot { height: 10px; width: 10px; background: #2ecc71; border-radius: 50%; box-shadow: 0 0 10px #2ecc71; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .btn-join {
            background: var(--accent); color: white; padding: 22px 60px; border-radius: 10px;
            font-weight: 900; text-transform: uppercase; text-decoration: none;
            font-size: 1.4rem; transition: 0.3s; box-shadow: 0 10px 30px rgba(255,0,0,0.3);
        }
        .btn-join:hover { background: white; color: black; transform: translateY(-5px); }

        .feature-box {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            padding: 30px; border-radius: 15px; transition: 0.3s; height: 100%;
        }
        .feature-box i { color: var(--accent); font-size: 2.5rem; margin-bottom: 20px; }
        
        .footer { background: #000; padding: 60px 0; border-top: 1px solid #222; margin-top: 80px; text-align: center; }
        .social-icons i { font-size: 1.8rem; margin: 0 15px; color: #555; transition: 0.3s; cursor: pointer; }
        .social-icons i:hover { color: var(--accent); }
    </style>
</head>
<body>

<div class="hero">
    <h1 class="main-title">PAŘBA<span style="color:var(--accent)">.EU</span></h1>
    <p style="letter-spacing: 10px; font-weight: 300;" class="text-white-50">PREMIUM VOICE SERVER</p>

    <div class="ip-card" onclick="copyIP()">

        <p class="text-secondary m-0 small">KLIKNI PRO ZKOPIROVÁNÍ ADRESY</p>
    </div>

    <a href="ts3server://ts.4thib.co.uk" class="btn-join">PŘIPOJIT SE HNED</a>

    <div class="container mt-5 pt-5">

                </div>
            </div>
            <div class="col-md-4">
                <div class="feature-box">

                    <p class="text-muted">Servery běží na nejrychlejší optice pro krystalicky čistý zvuk.</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="feature-box">
