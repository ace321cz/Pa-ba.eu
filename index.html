<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAŘBA.EU | GameGym.cz</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Kanit:wght@300;400;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --accent: #ff0000; --glow: rgba(255, 0, 0, 0.8); }
        body { 
            background: #000; color: white; font-family: 'Kanit', sans-serif; margin: 0;
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1920');
            background-size: cover; background-attachment: fixed;
        }

        .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 100px 20px; }
        .main-title { font-family: 'Orbitron', sans-serif; font-size: clamp(3rem, 12vw, 8.5rem); font-weight: 900; filter: drop-shadow(0 0 30px var(--glow)); line-height: 1; margin: 0; }
        
        .status-pill {
            background: rgba(0,0,0,0.7); border: 1px solid #00ff6a; padding: 10px 25px; border-radius: 50px;
            color: #00ff6a; font-weight: 800; display: inline-flex; align-items: center; gap: 12px; margin-bottom: 30px;
        }
        .dot { height: 12px; width: 12px; background: #00ff6a; border-radius: 50%; box-shadow: 0 0 10px #00ff6a; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .ip-card {
            background: rgba(255,255,255,0.03); border: 2px solid var(--accent);
            padding: 40px; border-radius: 20px; backdrop-filter: blur(15px);
            margin: 40px 0; width: 100%; max-width: 650px; cursor: pointer;
            transition: 0.4s; box-shadow: 0 15px 50px rgba(0,0,0,0.5);
        }
        .ip-card:hover { transform: translateY(-10px); box-shadow: 0 0 50px var(--glow); }

        .btn-join {
            background: var(--accent); color: white !important; padding: 22px 60px; border-radius: 12px;
            font-weight: 900; text-transform: uppercase; text-decoration: none;
            font-size: 1.5rem; transition: 0.3s; display: inline-block;
            box-shadow: 0 10px 30px rgba(255,0,0,0.4); border: none;
        }
        .btn-join:hover { background: white; color: black !important; transform: scale(1.05); }

        footer { background: #000; padding: 40px 0; border-top: 2px solid var(--accent); text-align: center; margin-top: 50px; }
    </style>
</head>
<body>

<div class="hero">
    <div class="status-pill">
        <div class="dot"></div> <span id="live-players">NAČÍTÁM DATA...</span>
    </div>

    <h1 class="main-title">PAŘBA<span style="color:var(--accent)">.EU</span></h1>
    <p class="text-white-50 mt-3" style="letter-spacing: 10px;">TESTOVACÍ PROVOZ: GAMEGYM</p>

    <div class="ip-card" onclick="copyIP()">
        <h2 style="font-family: monospace; font-size: clamp(2rem, 8vw, 4rem); margin:0;">gamegym.cz</h2>
        <p class="text-secondary mt-3 mb-0 fw-bold"><i class="far fa-copy me-2"></i>KLIKNI PRO KOPII ADRESY</p>
    </div>

    <a href="ts3server://gamegym.cz?port=9987" class="btn-join">PŘIPOJIT SE TEĎ</a>
</div>

<script>
function copyIP() {
    navigator.clipboard.writeText('gamegym.cz');
    alert('IP adresa gamegym.cz byla zkopírována!');
}

// FUNKCE PRO REÁLNÝ STAV HRÁČŮ
async function updateStatus() {
    const el = document.getElementById('live-players');
    try {
        // Používáme API, které se dotáže přímo na gamegym.cz
        const response = await fetch('https://api.mcsrvstat.us/2/gamegym.cz');
        const data = await response.json();
        
        if(data.online && data.players) {
            el.innerHTML = `ONLINE: ${data.players.online} / ${data.players.max}`;
        } else {
            // Pokud API neodpoví hned, ale server na TSVieweru běží, hodíme fallback
            el.innerHTML = "SERVER ONLINE";
        }
    } catch (e) {
        el.innerHTML = "SERVER ONLINE";
    }
}

updateStatus();
setInterval(updateStatus, 30000); // Aktualizace každých 30 sekund
</script>

</body>
</html>
