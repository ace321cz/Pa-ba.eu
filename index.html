<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAŘBA.EU | Oficiální TS3 Portál</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Kanit:wght@300;400;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --accent: #ff0000; --glow: rgba(255, 0, 0, 0.8); --glass: rgba(255,255,255,0.05); }
        body { 
            background: #000; color: white; font-family: 'Kanit', sans-serif; margin: 0;
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1920');
            background-size: cover; background-attachment: fixed;
        }

        .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 100px 20px; }
        .main-title { font-family: 'Orbitron', sans-serif; font-size: clamp(3rem, 12vw, 8rem); font-weight: 900; filter: drop-shadow(0 0 30px var(--glow)); line-height: 1; margin: 0; text-transform: uppercase; }
        
        /* OPRAVENÝ STATUS BOX */
        .status-container {
            background: rgba(0,0,0,0.8); border: 1px solid #00ff6a; padding: 15px; border-radius: 15px;
            margin-bottom: 30px; min-width: 280px; box-shadow: 0 0 20px rgba(0,255,106,0.2);
        }

        .ip-box {
            background: var(--glass); border: 2px solid var(--accent);
            padding: 35px; border-radius: 15px; backdrop-filter: blur(10px);
            margin: 30px 0; width: 100%; max-width: 600px; cursor: pointer;
            transition: 0.3s;
        }
        .ip-box:hover { transform: scale(1.02); box-shadow: 0 0 40px var(--glow); }

        .btn-join {
            background: var(--accent); color: white !important; padding: 20px 50px; border-radius: 10px;
            font-weight: 900; text-transform: uppercase; text-decoration: none;
            font-size: 1.4rem; transition: 0.3s; display: inline-block;
            box-shadow: 0 10px 25px rgba(255,0,0,0.4); border: none;
        }

        .content-card { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 30px; border: 1px solid rgba(255,255,255,0.1); height: 100%; }
        .admin-row { background: rgba(255,0,0,0.05); padding: 12px 20px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid var(--accent); }
    </style>
</head>
<body>

<div class="hero">
    <div class="status-container">
        <div style="color: #00ff6a; font-weight: bold; margin-bottom: 5px; font-size: 0.8rem; letter-spacing: 2px;">LIVE STATUS</div>
        <iframe src="https://www.tsviewer.com/promotion/viewer_compact.php?ID=1109930&bg=transparent&text=00ff6a&text_h=ffffff" 
                style="width:100%; max-width:200px; height:30px; border:none; overflow:hidden;"></iframe>
    </div>

    <h1 class="main-title">PAŘBA<span style="color:var(--accent)">.EU</span></h1>

    <div class="ip-box" onclick="copyIP()">
        <h2 style="font-family: monospace; font-size: clamp(1.8rem, 6vw, 3.5rem); margin:0;">gamegym.cz</h2>
        <p class="text-secondary mt-2 mb-0 small text-uppercase fw-bold">Klikni pro zkopírování adresy</p>
    </div>

    <a href="ts3server://gamegym.cz?port=9987" class="btn-join">PŘIPOJIT SE TEĎ</a>

    <div class="container mt-5 pt-4">
        <div class="row g-4 text-start">
            <div class="col-lg-6">
                <div class="content-card">
                    <h3 class="mb-4 font-orbitron">VEDENÍ</h3>
                    <div class="admin-row"><span>Ace321cz</span> <span class="badge bg-danger">MAJITEL</span></div>
                    <div class="admin-row"><span>Admin_1</span> <span class="badge bg-dark">HL. ADMIN</span></div>
                    <div class="admin-row"><span>Technik</span> <span class="badge bg-primary">SUPPORT</span></div>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="content-card">
                    <h3 class="mb-4 font-orbitron">PRAVIDLA</h3>
                    <div class="mb-2"><i class="fas fa-check text-danger me-2"></i> Slušné chování.</div>
                    <div class="mb-2"><i class="fas fa-check text-danger me-2"></i> Žádná reklama.</div>
                    <div class="mb-2"><i class="fas fa-check text-danger me-2"></i> Místnosti zdarma.</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function copyIP() {
    navigator.clipboard.writeText('gamegym.cz');
    alert('IP gamegym.cz byla zkopírována!');
}
</script>

</body>
</html>
