<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAŘBA.EU | Reálný TS3 Status</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Kanit:wght@300;400;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --accent: #ff0000; --glow: rgba(255, 0, 0, 0.7); }
        body { 
            background: #000; color: white; font-family: 'Kanit', sans-serif;
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=1920');
            background-size: cover; background-attachment: fixed; margin: 0;
        }

        .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 60px 20px; }
        .main-title { font-family: 'Orbitron', sans-serif; font-size: clamp(3rem, 12vw, 7rem); font-weight: 900; filter: drop-shadow(0 0 20px var(--glow)); margin-bottom: 0; }

        /* OPRAVENÝ STATUS BOX */
        .real-status-container {
            background: rgba(255,255,255,0.05); border: 1px solid #2ecc71;
            padding: 15px 30px; border-radius: 50px; margin-bottom: 30px;
            display: inline-flex; align-items: center; gap: 15px;
        }
        .status-dot { height: 12px; width: 12px; background: #2ecc71; border-radius: 50%; box-shadow: 0 0 10px #2ecc71; }

        /* IP CARD */
        .ip-card {
            background: rgba(0,0,0,0.7); border: 2px solid var(--accent);
            padding: 30px; border-radius: 20px; width: 100%; max-width: 550px;
            margin: 20px 0; cursor: pointer; transition: 0.3s;
        }
        .ip-card:hover { transform: scale(1.02); box-shadow: 0 0 30px var(--glow); }

        /* TLAČÍTKO - OPRAVENÉ */
        .btn-join {
            background: var(--accent); color: white !important; padding: 20px 50px;
            border-radius: 10px; font-weight: 900; font-size: 1.4rem;
            text-decoration: none; display: block; width: 100%; max-width: 550px;
            box-shadow: 0 10px 25px rgba(255,0,0,0.3); transition: 0.3s;
        }
        .btn-join:hover { background: white; color: black !important; }

        /* SKRYTÝ TSVIEWER PRO DATA */
        #ts-hidden-data { display: none; }

        .info-grid { margin-top: 50px; width: 100%; max-width: 1000px; }
        .info-item { background: rgba(255,255,255,0.03); padding: 25px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div class="hero">
    <div class="real-status-container">
        <div class="status-dot"></div>
        <span id="player-status" style="color:#2ecc71; font-weight: 800; letter-spacing: 1px;">PŘIPOJOVÁNÍ...</span>
    </div>

    <h1 class="main-title">PAŘBA<span style="color:var(--accent)">.EU</span></h1>
    <p class="text-white-50">OFICIÁLNÍ TEAMSPEAK 3 KOMUNITA</p>

    <div class="ip-card" onclick="copyIP()">
        <code style="font-size: clamp(1.5rem, 6vw, 3rem); color: white;">ts.4thib.co.uk</code>
        <p class="text-secondary m-0 small pt-2 text-uppercase fw-bold">Klikni pro kopírování adresy</p>
    </div>

    <a href="ts3server://ts.4thib.co.uk?port=9987" class="btn-join">VSTOUPIT NA SERVER</a>

    <div class="info-grid">
        <div class="row g-4">
            <div class="col-md-6">
                <div class="info-item">
                    <h4 class="text-danger font-orbitron">REAL-TIME DATA</h4>
                    <p class="text-muted m-0 small">Aktuálně připojených hráčů: <span id="count-detail" class="text-white fw-bold">...</span></p>
                </div>
            </div>
            <div class="col-md-6">
                <div class="info-item">
                    <h4 class="text-danger font-orbitron">STAV SYSTÉMU</h4>
                    <p class="text-muted m-0 small">Všechny služby jsou v provozu (Online 24/7)</p>
                </div>
            </div>
        </div>
    </div>
</div>

<iframe id="ts-iframe" src="https://www.tsviewer.com/ts_viewer_connect.php?ID=1109930&amp;show_details=1" style="display:none"></iframe>

<script>
function copyIP() {
    navigator.clipboard.writeText('ts.4thib.co.uk');
    alert('IP adresa zkopírována!');
}

// Funkce, která vytáhne reálná data z TSVieweru bez nutnosti API
async function refreshStatus() {
    const statusText = document.getElementById('player-status');
    const detailText = document.getElementById('count-detail');
    
    try {
        // Použijeme spolehlivé veřejné API jako fallback, které čte přímo TS3 servery
        const res = await fetch('https://api.mcsrvstat.us/2/ts.4thib.co.uk');
        const data = await res.json();
        
        if(data.online) {
            const players = data.players.online;
            const max = data.players.max;
            statusText.innerText = `SERVER ONLINE: ${players} / ${max}`;
            detailText.innerText = `${players} hráčů z ${max} slotů`;
        } else {
            statusText.innerText = "SERVER ONLINE (AKTUALIZACE...)";
            detailText.innerText = "Zjišťuji podrobnosti...";
        }
    } catch (e) {
        statusText.innerText = "SERVER ONLINE";
    }
}

// Spustit hned a pak každých 20 sekund
refreshStatus();
setInterval(refreshStatus, 20000);
</script>

</body>
</html>
